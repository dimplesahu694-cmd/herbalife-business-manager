<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Herbalife Business Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
        .header { background: #fff; padding: 1.5rem; border-bottom: 1px solid #e0e0e0; margin-bottom: 2rem; border-radius: 8px; }
        .title { font-size: 24px; font-weight: 600; margin: 0; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 2rem; margin-bottom: 2rem; }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
        input, select { width: 100%; padding: 10px 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background: #2563eb; color: #fff; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        button:hover { background: #1d4ed8; }
        .tabs { display: flex; gap: 0; border-bottom: 1px solid #e0e0e0; background: #fff; margin-bottom: 2rem; border-radius: 8px 8px 0 0; }
        .tab { padding: 12px 16px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; color: #666; }
        .tab.active { border-bottom-color: #2563eb; color: #2563eb; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 2rem; }
        .metric { background: #f8f9fa; padding: 1rem; border-radius: 8px; text-align: center; border: 1px solid #e0e0e0; }
        .metric-value { font-size: 28px; font-weight: 700; color: #2563eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #e0e0e0; background: #f8f9fa; font-weight: 600; }
        td { padding: 10px; border-bottom: 1px solid #e0e0e0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">🎯 Herbalife Business Manager</div>
        </div>
        
        <div id="loginScreen">
            <div class="card">
                <div class="card-title">🔐 Login / Create Account</div>
                <input id="email" type="email" placeholder="Email">
                <input id="password" type="password" placeholder="Password">
                <button onclick="login()">Sign In / Create Account</button>
                <div style="margin-top: 1rem; padding: 1rem; background: #f0f9ff; border: 1px solid #bfdbfe; border-radius: 6px; font-size: 13px;">
                    Use any email and password!
                </div>
            </div>
        </div>

        <div id="appScreen" class="hidden">
            <div style="text-align: right; margin-bottom: 1rem;">
                <button onclick="logout()" style="background: #dc2626;">Logout</button>
            </div>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('dashboard')">📊 Dashboard</div>
                <div class="tab" onclick="switchTab('leads')">📋 Leads</div>
                <div class="tab" onclick="switchTab('team')">👥 Team</div>
                <div class="tab" onclick="switchTab('daily')">📅 Daily Log</div>
            </div>

            <div id="dashboard">
                <div class="grid">
                    <div class="metric"><div style="font-size: 12px; color: #666;">Total Leads</div><div class="metric-value" id="totalLeads">0</div></div>
                    <div class="metric"><div style="font-size: 12px; color: #666;">Hot Leads</div><div class="metric-value" id="hotLeads">0</div></div>
                    <div class="metric"><div style="font-size: 12px; color: #666;">Team</div><div class="metric-value" id="teamCount">0</div></div>
                </div>
            </div>

            <div id="leads" class="hidden">
                <div class="card">
                    <div class="card-title">➕ Add Lead</div>
                    <input id="leadName" placeholder="Name">
                    <input id="leadPhone" placeholder="Phone">
                    <select id="leadStatus">
                        <option>Select Status</option>
                        <option>New</option>
                        <option>Hot Lead</option>
                        <option>Converted</option>
                    </select>
                    <button onclick="addLead()">+ Add Lead</button>
                </div>
                <div class="card">
                    <table>
                        <thead><tr><th>Name</th><th>Phone</th><th>Status</th></tr></thead>
                        <tbody id="leadsTable"></tbody>
                    </table>
                </div>
            </div>

            <div id="team" class="hidden">
                <div class="card">
                    <div class="card-title">👥 Add Team Member</div>
                    <input id="teamName" placeholder="Name">
                    <input id="teamPhone" placeholder="Phone">
                    <button onclick="addTeam()">+ Add Member</button>
                </div>
            </div>

            <div id="daily" class="hidden">
                <div class="card">
                    <div class="card-title">📊 Daily Log</div>
                    <input id="logDate" type="date">
                    <input id="logContacts" type="number" placeholder="Contacts">
                    <button onclick="addLog()">+ Log</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let user = null;
        let data = { leads: [], team: [], dailyLog: [] };

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('Please enter email and password');
                return;
            }
            user = { email, uid: btoa(email + Date.now()) };
            localStorage.setItem('herbalifeUser', JSON.stringify(user));
            loadUserData();
            showApp();
        }

        function logout() {
            localStorage.removeItem('herbalifeUser');
            user = null;
            data = { leads: [], team: [], dailyLog: [] };
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
        }

        function loadUserData() {
            const saved = localStorage.getItem(`herbalifeData_${user.uid}`);
            if (saved) data = JSON.parse(saved);
        }

        function saveData() {
            localStorage.setItem(`herbalifeData_${user.uid}`, JSON.stringify(data));
            updateDashboard();
        }

        function showApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            updateDashboard();
        }

        function switchTab(tab) {
            document.querySelectorAll('[id$="Screen"] > div[id]').forEach(el => el.classList.add('hidden'));
            document.getElementById(tab)?.classList.remove('hidden');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
        }

        function addLead() {
            const name = document.getElementById('leadName').value;
            const phone = document.getElementById('leadPhone').value;
            const status = document.getElementById('leadStatus').value;
            if (!name || !phone) { alert('Fill all fields'); return; }
            data.leads.push({ id: Date.now(), name, phone, status });
            document.getElementById('leadName').value = '';
            document.getElementById('leadPhone').value = '';
            saveData();
            renderLeads();
        }

        function addTeam() {
            const name = document.getElementById('teamName').value;
            if (!name) { alert('Fill name'); return; }
            data.team.push({ id: Date.now(), name });
            document.getElementById('teamName').value = '';
            saveData();
        }

        function addLog() {
            const date = document.getElementById('logDate').value;
            const contacts = document.getElementById('logContacts').value;
            if (!date || !contacts) { alert('Fill fields'); return; }
            data.dailyLog.push({ id: Date.now(), date, contacts });
            document.getElementById('logDate').value = '';
            document.getElementById('logContacts').value = '';
            saveData();
        }

        function updateDashboard() {
            const hotLeads = data.leads.filter(l => l.status === 'Hot Lead').length;
            document.getElementById('totalLeads').textContent = data.leads.length;
            document.getElementById('hotLeads').textContent = hotLeads;
            document.getElementById('teamCount').textContent = data.team.length;
        }

        function renderLeads() {
            const tbody = document.getElementById('leadsTable');
            tbody.innerHTML = data.leads.map(lead => `
                <tr>
                    <td>${lead.name}</td>
                    <td>${lead.phone}</td>
                    <td>${lead.status}</td>
                </tr>
            `).join('');
        }

        window.addEventListener('load', () => {
            const savedUser = localStorage.getItem('herbalifeUser');
            if (savedUser) {
                user = JSON.parse(savedUser);
                loadUserData();
                showApp();
            }
        });
    </script>
</body>
</html>
